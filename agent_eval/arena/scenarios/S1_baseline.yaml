# ═══════════════════════════════════════════════════════════════════════════════
# S1 — Baseline (Normal Traffic, No Attack)
# Purpose: Establish False Positive Rate (FPR) baseline across all zones.
# ═══════════════════════════════════════════════════════════════════════════════

scenario_id: S1
name: "Baseline — Normal Traffic"
description: >
  No attack. Generates only normal zone traffic to establish FPR baseline.
  A strong SOC pipeline should produce zero alerts on this scenario.

target_zone: bkc_commercial
target_zone_name: BKC Commercial
security_level: 2
severity: NONE

timing:
  total_duration_sec: 120
  warmup_sec: 120
  cooldown_sec: 0

phases: []              # No attack phases — pure normal traffic

ground_truth:
  attack_type: none
  severity: NONE
  expected_detection: false  # Agent should NOT detect any attack

mitre_ttps: []

evaluation:
  expected_outcome: benign
  key_metric: false_positive_rate
  acceptable_fpr: 0.05       # < 5% FPR is acceptable
