# ============================================================
#  AI Cyber Arena — Docker Compose
#  Simulates Mumbai smart lighting grid + SOC agent pipeline
#  Usage: docker-compose up -d
# ============================================================

version: "3.9"

services:
  # ── Message Broker (Kafka-compatible, lightweight) ───────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: arena-redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 256M
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --set redpanda.auto_create_topics_enabled=true
    ports:
      - "19092:19092" # External Kafka port for local tools
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - arena-net
    healthcheck:
      test: [ "CMD", "rpk", "cluster", "health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Shared State Store ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: arena-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - arena-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Topic Initialization ─────────────────────────────────
  topic-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: arena-topic-init
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - arena-net
    entrypoint: /bin/bash
    command: |
      -c "
      echo 'Creating Kafka topics...'
      rpk topic create network_events   --brokers redpanda:9092 --partitions 3 --replicas 1
      rpk topic create device_events    --brokers redpanda:9092 --partitions 3 --replicas 1
      rpk topic create sensor_data      --brokers redpanda:9092 --partitions 3 --replicas 1
      rpk topic create cyber_alerts     --brokers redpanda:9092 --partitions 3 --replicas 1
      rpk topic create normalized_events --brokers redpanda:9092 --partitions 3 --replicas 1
      rpk topic create incident_reports --brokers redpanda:9092 --partitions 1 --replicas 1
      rpk topic create agent_metrics    --brokers redpanda:9092 --partitions 1 --replicas 1
      echo 'Topics created successfully.'
      rpk topic list --brokers redpanda:9092
      "

  # ── Zone Simulators (Mumbai Smart Lighting Grid) ─────────
  # Each zone simulates a realistic segment of Mumbai's grid
  # with smart poles, gateways, and zone controllers.

  zone-bkc:
    build:
      context: .
      dockerfile: Dockerfile.zone
    container_name: arena-zone-bkc
    environment:
      - ZONE_ID=bkc_commercial
      - ZONE_NAME=BKC Commercial District
      - NUM_POLES=8
      - NUM_GATEWAYS=2
      - SECURITY_LEVEL=3
      - TRAFFIC_PROFILE=commercial_high
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - arena-net
    profiles:
      - full
      - bkc

  zone-hospital:
    build:
      context: .
      dockerfile: Dockerfile.zone
    container_name: arena-zone-hospital
    environment:
      - ZONE_ID=reliance_hospital
      - ZONE_NAME=Reliance Hospital Complex
      - NUM_POLES=12
      - NUM_GATEWAYS=3
      - SECURITY_LEVEL=4
      - TRAFFIC_PROFILE=critical_healthcare
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - arena-net
    profiles:
      - full
      - hospital

  zone-airport:
    build:
      context: .
      dockerfile: Dockerfile.zone
    container_name: arena-zone-airport
    environment:
      - ZONE_ID=airport
      - ZONE_NAME=Mumbai Airport Perimeter
      - NUM_POLES=15
      - NUM_GATEWAYS=4
      - SECURITY_LEVEL=4
      - TRAFFIC_PROFILE=critical_transport
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - arena-net
    profiles:
      - full
      - airport

  zone-port:
    build:
      context: .
      dockerfile: Dockerfile.zone
    container_name: arena-zone-port
    environment:
      - ZONE_ID=port_area
      - ZONE_NAME=Mumbai Port & Docks
      - NUM_POLES=10
      - NUM_GATEWAYS=2
      - SECURITY_LEVEL=3
      - TRAFFIC_PROFILE=industrial
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - arena-net
    profiles:
      - full
      - port

  zone-school:
    build:
      context: .
      dockerfile: Dockerfile.zone
    container_name: arena-zone-school
    environment:
      - ZONE_ID=school_complex
      - ZONE_NAME=Municipal School Complex
      - NUM_POLES=6
      - NUM_GATEWAYS=1
      - SECURITY_LEVEL=2
      - TRAFFIC_PROFILE=institutional
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - arena-net
    profiles:
      - full
      - school

  zone-residential:
    build:
      context: .
      dockerfile: Dockerfile.zone
    container_name: arena-zone-residential
    environment:
      - ZONE_ID=residential
      - ZONE_NAME=Andheri Residential Zone
      - NUM_POLES=20
      - NUM_GATEWAYS=5
      - SECURITY_LEVEL=2
      - TRAFFIC_PROFILE=residential
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - arena-net
    profiles:
      - full
      - residential

  zone-highway:
    build:
      context: .
      dockerfile: Dockerfile.zone
    container_name: arena-zone-highway
    environment:
      - ZONE_ID=highway_corridor
      - ZONE_NAME=Western Express Highway
      - NUM_POLES=25
      - NUM_GATEWAYS=6
      - SECURITY_LEVEL=3
      - TRAFFIC_PROFILE=highway
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - arena-net
    profiles:
      - full
      - highway

  # ── SOC Agent Pipeline ───────────────────────────────────
  # Runs live_pipeline.py: Kafka consumer → SOCPipeline → Redis/Kafka results
  soc-agents:
    build:
      context: .
      dockerfile: Dockerfile.agents
    container_name: arena-soc-agents
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - REDIS_URL=redis://redis:6379/0
      - ACTIVE_MODEL=llama-3.1-8b
      - PIPELINE_WINDOW_SECONDS=30
      - LOG_LEVEL=INFO
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - arena-net
    restart: unless-stopped

  # ── Arena Controller & Evaluator ─────────────────────────
  arena-controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
    container_name: arena-controller
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./reports:/app/reports
      - ./agents/cybersecurity/src/evaluation/scenarios:/app/scenarios
    networks:
      - arena-net
    profiles:
      - eval

volumes:
  redpanda-data:
  redis-data:


networks:
  arena-net:
    driver: bridge
